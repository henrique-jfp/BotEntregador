name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run lint (optional)
        run: |
          echo "Skipping lint if not configured"
      - name: Run unit tests
        run: |
          pytest -q || true

  smoke-e2e:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run E2E smoke (headless, no static maps)
        env:
          DISABLE_STATIC_MAPS: '1'
          PROMETHEUS_ENABLED: '0'
        run: |
          python scripts/e2e_simulate_flow.py
